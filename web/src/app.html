<!doctype html>
<!-- `dark` class makes shadcn-svelte components use their dark palette to match the deck. -->
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<!-- viewport-fit=cover so 100dvh slides fill correctly under mobile browser chrome -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta
			name="description"
			content="Recursive Coding Agents — Raymond Weitekamp's AI Engineer World's Fair 2026 talk deck and companion website."
		/>
		<meta name="theme-color" content="#0E1116" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
